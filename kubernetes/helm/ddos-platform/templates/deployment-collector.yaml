apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ddos-platform.fullname" . }}-collector
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ddos-platform.labels" . | nindent 4 }}
    app: collector
spec:
  replicas: {{ .Values.replicaCount.collector }}
  selector:
    matchLabels:
      app: collector
  template:
    metadata:
      labels:
        app: collector
        {{- include "ddos-platform.selectorLabels" . | nindent 8 }}
    spec:
      containers:
      - name: collector
        image: {{ .Values.image.registry }}/{{ .Values.image.collector.repository }}:{{ .Values.image.collector.tag }}
        imagePullPolicy: {{ .Values.image.collector.pullPolicy }}
        ports:
        - containerPort: 2055
          protocol: UDP
          name: netflow
        - containerPort: 6343
          protocol: UDP
          name: sflow
        - containerPort: 4739
          protocol: UDP
          name: ipfix
        envFrom:
        - configMapRef:
            name: {{ include "ddos-platform.fullname" . }}-config
        - secretRef:
            name: {{ include "ddos-platform.fullname" . }}-secrets
        resources:
          {{- toYaml .Values.resources.collector | nindent 10 }}
