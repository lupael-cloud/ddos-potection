apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ddos-platform.fullname" . }}-api
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ddos-platform.labels" . | nindent 4 }}
    app: backend
spec:
  replicas: {{ .Values.replicaCount.api }}
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        {{- include "ddos-platform.selectorLabels" . | nindent 8 }}
    spec:
      containers:
      - name: api
        image: {{ .Values.image.registry }}/{{ .Values.image.api.repository }}:{{ .Values.image.api.tag }}
        imagePullPolicy: {{ .Values.image.api.pullPolicy }}
        ports:
        - containerPort: 8000
          name: http
        envFrom:
        - configMapRef:
            name: {{ include "ddos-platform.fullname" . }}-config
        - secretRef:
            name: {{ include "ddos-platform.fullname" . }}-secrets
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          {{- toYaml .Values.resources.api | nindent 10 }}
