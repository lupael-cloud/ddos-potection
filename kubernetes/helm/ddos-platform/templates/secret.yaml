apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ddos-platform.fullname" . }}-secrets
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ddos-platform.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.secrets.databaseUrl | quote }}
  SECRET_KEY: {{ .Values.secrets.secretKey | quote }}
  SMTP_PASSWORD: {{ .Values.secrets.smtpPassword | quote }}
  TELEGRAM_BOT_TOKEN: {{ .Values.secrets.telegramBotToken | quote }}
  STRIPE_API_KEY: {{ .Values.secrets.stripeApiKey | quote }}
