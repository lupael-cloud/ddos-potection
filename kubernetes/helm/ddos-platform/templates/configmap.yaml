apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ddos-platform.fullname" . }}-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ddos-platform.labels" . | nindent 4 }}
data:
  HOST: {{ .Values.config.host | quote }}
  PORT: {{ .Values.config.port | quote }}
  DEBUG: {{ .Values.config.debug | quote }}
  REDIS_HOST: {{ .Values.config.redisHost | quote }}
  REDIS_PORT: {{ .Values.config.redisPort | quote }}
  NETFLOW_PORT: {{ .Values.config.netflowPort | quote }}
  SFLOW_PORT: {{ .Values.config.sflowPort | quote }}
  IPFIX_PORT: {{ .Values.config.ipfixPort | quote }}
  SYN_FLOOD_THRESHOLD: {{ .Values.config.synFloodThreshold | quote }}
  UDP_FLOOD_THRESHOLD: {{ .Values.config.udpFloodThreshold | quote }}
  ENTROPY_THRESHOLD: {{ .Values.config.entropyThreshold | quote }}
  AUTO_MITIGATION: {{ .Values.config.autoMitigation | quote }}
